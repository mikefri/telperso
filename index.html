<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<div id="status">Statut : En attente...</div>
<button id="call-btn">Lancer l'appel audio</button>
<audio id="remote-audio" autoplay></audio>

<script>
    const peer = new Peer('votre-id-unique-au-choix'); // Votre ID fixe sur votre PC

    // 1. Recevoir l'appel (Sur votre PC)
    peer.on('call', (call) => {
        navigator.mediaDevices.getUserMedia({audio: true}).then((stream) => {
            call.answer(stream); // Vous répondez avec votre micro
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-audio').srcObject = remoteStream;
            });
        });
    });

    // 2. Passer l'appel (Côté Visiteur)
    document.getElementById('call-btn').addEventListener('click', () => {
        navigator.mediaDevices.getUserMedia({audio: true}).then((stream) => {
            const call = peer.call('votre-id-unique-au-choix', stream);
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-audio').srcObject = remoteStream;
            });
        });
    });
</script>
